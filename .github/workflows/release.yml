name: Automatic Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  release:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && !contains(github.event.head_commit.message, 'chore: bump version'))

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Setup pnpm cache
        uses: actions/cache@v3
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Analyze commits
        id: analyze
        shell: bash
        run: |
          # Get the last tag
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          
          if [ -z "$LAST_TAG" ]; then
            # No tags yet, check if we should create initial release
            COMMITS=$(git log --oneline | wc -l)
            if [ "$COMMITS" -gt 0 ]; then
              echo "should_release=true" >> $GITHUB_OUTPUT
              echo "version_type=minor" >> $GITHUB_OUTPUT
            else
              echo "should_release=false" >> $GITHUB_OUTPUT
            fi
          else
            # Analyze commits since last tag
            COMMITS=$(git log "$LAST_TAG"..HEAD --oneline)
            
            if echo "$COMMITS" | grep -q "^feat"; then
              echo "should_release=true" >> $GITHUB_OUTPUT
              echo "version_type=minor" >> $GITHUB_OUTPUT
            elif echo "$COMMITS" | grep -q "^fix"; then
              echo "should_release=true" >> $GITHUB_OUTPUT
              echo "version_type=patch" >> $GITHUB_OUTPUT
            elif echo "$COMMITS" | grep -q "^BREAKING CHANGE"; then
              echo "should_release=true" >> $GITHUB_OUTPUT
              echo "version_type=major" >> $GITHUB_OUTPUT
            else
              echo "should_release=false" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Bump version
        if: steps.analyze.outputs.should_release == 'true'
        id: version
        shell: bash
        run: |
          CURRENT_VERSION=$(node -p "require('./package.json').version")
          echo "current_version=$CURRENT_VERSION" >> $GITHUB_OUTPUT
          
          npm version ${{ steps.analyze.outputs.version_type }} --no-git-tag-version
          NEW_VERSION=$(node -p "require('./package.json').version")
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT

      - name: Update CHANGELOG
        if: steps.analyze.outputs.should_release == 'true'
        shell: bash
        run: |
          NEW_VERSION=${{ steps.version.outputs.new_version }}
          CURRENT_DATE=$(date +"%Y-%m-%d")
          
          # Get commits since last tag
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -z "$LAST_TAG" ]; then
            COMMITS=$(git log --oneline)
          else
            COMMITS=$(git log "$LAST_TAG"..HEAD --oneline)
          fi
          
          # Create new changelog entry
          {
            echo "## [$NEW_VERSION] - $CURRENT_DATE"
            echo ""
            echo "### Added"
            echo "$(echo "$COMMITS" | grep "^feat" | sed 's/^[a-f0-9]* feat: /- /' || echo '- No new features')"
            echo ""
            echo "### Fixed"
            echo "$(echo "$COMMITS" | grep "^fix" | sed 's/^[a-f0-9]* fix: /- /' || echo '- No fixes')"
            echo ""
            echo "### Changed"
            echo "$(echo "$COMMITS" | grep "^BREAKING CHANGE" | sed 's/^[a-f0-9]* /- /' || echo '- No breaking changes')"
            echo ""
            tail -n +1 CHANGELOG.md
          } > CHANGELOG.md.tmp
          mv CHANGELOG.md.tmp CHANGELOG.md

      - name: Commit and tag
        if: steps.analyze.outputs.should_release == 'true'
        shell: bash
        run: |
          NEW_VERSION=${{ steps.version.outputs.new_version }}
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json CHANGELOG.md
          git commit -m "chore: bump version to $NEW_VERSION"
          git tag "v$NEW_VERSION"
          git push origin main
          git push origin "v$NEW_VERSION"

      - name: Trigger publish workflow
        if: steps.analyze.outputs.should_release == 'true'
        shell: bash
        run: |
          # The publish workflow will be triggered automatically by the release event
          # created when we push the tag
          echo "Release tag pushed. Publish workflow will be triggered automatically."
